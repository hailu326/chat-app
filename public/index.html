<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="<link rel="stylesheet"
     href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
     integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" 
     crossorigin="anonymous" referrerpolicy="no-referrer" />">
    <title>Oromo Chat App</title>
    
</head>
<body>
    <h1 class="title">HAILU chat App🗨️</h1>
    <div class="main">
        <div class="name">
            <span><i class="far fa-user"></i></span>
            <input type="text" id="name-input" class="name-input" value="👤anonymous" maxlength="20">
        </div>
         <ul class="message-container" id="message-container">
            <li class="message-left">
                <p class="message">
                    akkam jirtu
                    <span>at 26 july 10:40</span>
                </p>
            </li>
            <li class="message-right">
                <p class="message">
                    glt waaqaa akkam isin
                    <span>at 26 july 10:40</span>
                </p>
            </li>
            <li class="message-feedback">
                <p class="feedback" id="feedback">
                    somebody is typing a message
                </p>
            </li>
         </ul>
         <form class="message-form" id="message-form">
            <input type="text" name="message" id="message-input" class="message-input">
            <div class="v-divider"></div>
            <button type="submit" class="send-button">send <span>
                <i class="fas fa-papper-plane"></i>
            </span></button>
         </form>
         <h3 class="clients-total" id="client-total">Total clients:2</h3>
    </div>
   
   
    <script src="/socket.io/socket.io.js"></script>
    <script src="main.js"></script>
